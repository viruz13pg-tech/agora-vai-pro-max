name: Build & Deploy Agora Vai PRO MAX

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 21

    - name: Grant Gradle execute permission
      run: chmod +x gradlew

    - name: Build APK & AAB
      run: ./gradlew clean assembleDebug bundleDebug --no-daemon

    - name: Prepare GitHub Pages release
      run: |
        mkdir -p gh-pages
        cp app/build/outputs/apk/debug/app-debug.apk gh-pages/
        sudo apt-get update && sudo apt-get install -y qrencode
        APK_URL="https://$GITHUB_REPOSITORY_OWNER.github.io/$GITHUB_REPOSITORY/app-debug.apk"
        qrencode -o gh-pages/qr.png "$APK_URL"
        cat <<EOF > gh-pages/index.html
        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
          <meta charset="UTF-8">
          <title>Agora Vai PRO MAX - Download</title>
          <style>
            body { font-family: Arial; text-align:center; padding:50px; }
            button { padding:15px 30px; font-size:18px; margin:20px; cursor:pointer; }
            img { max-width:200px; margin-top:20px; }
          </style>
        </head>
        <body>
          <h1>Agora Vai PRO MAX</h1>
          <p>Clique no botão para baixar o APK:</p>
          <a href="app-debug.apk"><button>Instalar Agora</button></a>
          <p>Ou escaneie o QR code:</p>
          <img src="qr.png" alt="QR Code Download">
        </body>
        </html>
        EOF

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v6
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh-pages
        destination_dir: .
